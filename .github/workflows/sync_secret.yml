name: Sync Magic Link Secret to Apps Script

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GH_PAT }}

      - name: Inject MAGIC_LINK_SECRET into Apps Script
        env:
          MAGIC_LINK_SECRET: ${{ secrets.MAGIC_LINK_SECRET }}
        run: |
          # Remplacer le secret hardcodé dans apps_script_webapp.gs
          OLD_SECRET="db842af52df466861c7ce6605a760ad6ddaebf682f302a29"
          NEW_SECRET="$MAGIC_LINK_SECRET"
          
          if [ -z "$NEW_SECRET" ]; then
            echo "::error::MAGIC_LINK_SECRET est vide"
            exit 1
          fi
          
          sed -i "s/$OLD_SECRET/$NEW_SECRET/g" apps_script_webapp.gs
          
          # Vérifier
          if grep -q "$NEW_SECRET" apps_script_webapp.gs; then
            echo "::notice::Secret synchronisé avec succès"
          else
            echo "::error::Remplacement échoué"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp + redeploy
        run: |
          npm install -g @google/clasp
          cat > ~/.clasprc.json << CREDS
          {"tokens":{"default":{"client_id":"${{ secrets.CLASP_CLIENT_ID }}","client_secret":"${{ secrets.CLASP_CLIENT_SECRET }}","type":"authorized_user","refresh_token":"${{ secrets.CLASP_REFRESH_TOKEN }}"}}}
          CREDS
          echo '{"scriptId":"${{ secrets.APPS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json
          cp apps_script_webapp.gs Code.gs
          cat > appsscript.json << META
          {"timeZone":"Europe/Zurich","dependencies":{},"exceptionLogging":"STACKDRIVER","runtimeVersion":"V8","webapp":{"executeAs":"USER_DEPLOYING","access":"ANYONE_ANONYMOUS"}}
          META
          clasp push --force
          clasp deploy --deploymentId "AKfycbx8CIFB6iyzNUYWE_SHSuvCzHI3SLz2lSXQcRDvm671ARn39r6Mx29CtvsAf02ACNdl7w" --description "Sync magic link secret $(date '+%Y-%m-%d')"
          echo "::notice::$(clasp deployments 2>&1)"

      - name: Commit updated gs file
        run: |
          git config user.name "PhémeApp Bot"
          git config user.email "alerte@phemeapp.ch"
          git add apps_script_webapp.gs
          git diff --staged --quiet || (git commit -m "fix: sync MAGIC_LINK_SECRET dans Apps Script" && git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:gh-pages)
          echo "::notice::Commit done"
