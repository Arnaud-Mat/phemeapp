name: Update WebApp URL v2

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GH_PAT }}

      - name: Find working URL and update
        env:
          CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.parse, sys, re

          cid  = os.environ['CLIENT_ID']
          csec = os.environ['CLIENT_SECRET']
          rtok = os.environ['REFRESH_TOKEN']
          sid  = os.environ['SCRIPT_ID']

          # Token
          data = urllib.parse.urlencode({'client_id':cid,'client_secret':csec,
              'refresh_token':rtok,'grant_type':'refresh_token'}).encode()
          with urllib.request.urlopen(urllib.request.Request(
              'https://oauth2.googleapis.com/token', data=data)) as r:
              tok = json.loads(r.read())['access_token']

          # List deployments
          with urllib.request.urlopen(urllib.request.Request(
              f'https://script.googleapis.com/v1/projects/{sid}/deployments',
              headers={'Authorization':f'Bearer {tok}'})) as r:
              deps = json.loads(r.read())

          print(f"::notice::Total deployments: {len(deps.get('deployments',[]))}")

          best_url = None
          for dep in deps.get('deployments',[]):
              did = dep.get('deploymentId','')
              for ep in dep.get('entryPoints',[]):
                  wa = ep.get('webApp',{})
                  url = wa.get('url','')
                  access = wa.get('access','')
                  if not url or 'exec' not in url: continue

                  print(f"::notice::Testing {did[:30]} access={access} url={url[:80]}")

                  # Test subscribe (plus permissif)
                  try:
                      body = json.dumps({
                          "action":"subscribe","nom":"URLTest","email":"urltest@testonly.ch",
                          "adresse1":"Rue de Bourg 10 1003 Lausanne","label1":"Test"
                      }).encode()
                      req = urllib.request.Request(url, data=body,
                          headers={'Content-Type':'application/json'}, method='POST')
                      with urllib.request.urlopen(req, timeout=20) as r2:
                          result = r2.read().decode()
                      print(f"::notice::Result {did[:20]}: {result[:200]}")
                      parsed = json.loads(result)
                      if 'success' in parsed or 'already_exists' in parsed:
                          best_url = url
                          print(f"::notice::BEST_URL:{url}")
                          break
                  except Exception as e:
                      print(f"::notice::Error {did[:20]}: {type(e).__name__}: {e}")
              if best_url: break

          if not best_url:
              print("::error::No working URL found")
              sys.exit(1)

          # Update files
          for fname in ['index.html', 'mon-compte.html']:
              content = open(fname, encoding='utf-8').read()
              new_content = re.sub(
                  r'https://script\.google\.com/macros/s/[^\'\"]+/exec',
                  best_url, content
              )
              if new_content != content:
                  open(fname, 'w', encoding='utf-8').write(new_content)
                  print(f"::notice::Updated {fname}")
              else:
                  print(f"::notice::{fname} no change needed")
          PYEOF

      - name: Commit
        run: |
          git config user.name "PhémeApp Bot"
          git config user.email "alerte@phemeapp.ch"
          git add index.html mon-compte.html || true
          git diff --staged --quiet || (git commit -m "fix: update WEBAPP_URL to anonymous-access deployment" && git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:gh-pages)
          echo "::notice::Commit done"
