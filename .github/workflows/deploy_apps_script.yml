name: Deploy Apps Script

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: |
          cat > ~/.clasprc.json << 'CREDS'
          {
            "tokens": {
              "default": {
                "client_id": "${{ secrets.CLASP_CLIENT_ID }}",
                "client_secret": "${{ secrets.CLASP_CLIENT_SECRET }}",
                "type": "authorized_user",
                "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}"
              }
            }
          }
          CREDS
          echo "::notice::clasprc.json créé"

      - name: Setup project files
        run: |
          echo '{"scriptId":"${{ secrets.APPS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json
          cp apps_script_webapp.gs Code.gs
          cat > appsscript.json << 'META'
          {"timeZone":"Europe/Zurich","dependencies":{},"exceptionLogging":"STACKDRIVER","runtimeVersion":"V8","webapp":{"executeAs":"USER_DEPLOYING","access":"ANYONE_ANONYMOUS"}}
          META
          echo "::notice::Fichiers projet configurés. Script ID: ${{ secrets.APPS_SCRIPT_ID }}"

      - name: Clasp whoami (test auth)
        run: |
          set +e
          OUTPUT=$(clasp whoami 2>&1)
          echo "::notice::clasp whoami: $OUTPUT"
          echo "$OUTPUT"

      - name: Push code to Apps Script
        run: |
          set +e
          OUTPUT=$(clasp push --force 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          echo "::notice::clasp push output: $OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "::error::clasp push failed (exit $EXIT): $OUTPUT"
            exit $EXIT
          fi

      - name: Deploy new version
        run: |
          set +e
          OUTPUT=$(clasp deploy \
            --deploymentId "AKfycbx8CIFB6iyzNUYWE_SHSuvCzHI3SLz2lSXQcRDvm671ARn39r6Mx29CtvsAf02ACNdl7w" \
            --description "Deploy $(date '+%Y-%m-%d %H:%M') via GitHub Actions" 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          echo "::notice::clasp deploy: $OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "::error::clasp deploy failed: $OUTPUT"
            exit $EXIT
          fi

      - name: Verify
        run: clasp deployments
