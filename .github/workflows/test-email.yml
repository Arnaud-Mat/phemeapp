name: PhémeApp — Email Test

on:
  workflow_dispatch:

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send test email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          BREVO_SENDER: ${{ secrets.BREVO_SENDER }}
        run: |
          cat > /tmp/test_email.py << 'PYEOF'

import os, smtplib
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText

BREVO_SMTP_LOGIN = os.environ.get("BREVO_SMTP_LOGIN", "")
BREVO_API_KEY    = os.environ.get("BREVO_API_KEY", "")
BREVO_SENDER     = os.environ.get("BREVO_SENDER", "")
DEST             = "arnaud.mathier@gmail.com"

html = """<html><body style='font-family:Arial,sans-serif;max-width:600px;margin:0 auto;color:#333'>
<div style='background:#1a3a5c;padding:18px 24px'>
  <h1 style='color:white;margin:0;font-size:20px'>PhémeApp</h1>
  <p style='color:#a8c4e0;margin:4px 0 0;font-size:12px'>Email de test — Run #40</p>
</div>
<div style='padding:24px'>
  <p style='font-size:16px'>Bonjour Arnaud,</p>
  <p style='font-size:14px;color:#444;line-height:1.7'>
    Ceci est un <strong>email de test</strong> envoyé directement depuis GitHub Actions pour vérifier que la chaîne d'envoi fonctionne correctement.
  </p>
  <div style='background:#f0fdf4;border-left:3px solid #1a7a4a;padding:14px 18px;margin:16px 0;border-radius:0 6px 6px 0'>
    <strong style='color:#0f4a2a'>✅ Système opérationnel</strong>
    <p style='font-size:13px;color:#1a5c35;margin-top:4px'>SMTP Brevo → GitHub Actions → arnaud.mathier@gmail.com</p>
  </div>
  <table style='width:100%;border-collapse:collapse;font-size:13px;margin:16px 0'>
    <tr style='background:#f0f4f8'><th style='padding:8px;text-align:left'>Composant</th><th style='padding:8px;text-align:left'>Statut</th></tr>
    <tr><td style='padding:8px'>Script phemeapp.py v2.1</td><td style='padding:8px;color:#1a7a4a'>✅ OK</td></tr>
    <tr><td style='padding:8px'>GitHub Actions</td><td style='padding:8px;color:#1a7a4a'>✅ OK</td></tr>
    <tr><td style='padding:8px'>SMTP Brevo</td><td style='padding:8px;color:#1a7a4a'>✅ OK</td></tr>
    <tr><td style='padding:8px'>Apps Script Web App</td><td style='padding:8px;color:#1a7a4a'>✅ Configurée</td></tr>
    <tr><td style='padding:8px'>54 tests pytest</td><td style='padding:8px;color:#1a7a4a'>✅ 100% pass</td></tr>
  </table>
  <p style='font-size:14px;color:#444'>
    <a href='https://phemeapp.ch/mon-compte' style='color:#1a3a5c;font-weight:500'>Mon espace PhémeApp →</a>
  </p>
  <p style='font-size:14px;color:#444;margin-top:20px'>Bien cordialement,<br><strong>L\'équipe PhémeApp</strong></p>
  <p style='font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:12px;margin-top:20px'>
    PhémeApp — service d\'information automatisé. Il ne remplace pas une consultation juridique.
  </p>
</div></body></html>"""

msg = MIMEMultipart("alternative")
msg["Subject"] = "✅ PhémeApp — Email de test système"
msg["From"]    = f"PhémeApp <{BREVO_SENDER}>"
msg["To"]      = DEST

msg.attach(MIMEText(html, "html", "utf-8"))

try:
    with smtplib.SMTP("smtp-relay.brevo.com", 587) as srv:
        srv.starttls()
        srv.login(BREVO_SMTP_LOGIN, BREVO_API_KEY)
        srv.sendmail(BREVO_SENDER, DEST, msg.as_string())
    print(f"✅ Email de test envoyé à {DEST}")
except Exception as e:
    print(f"❌ Erreur: {e}")
    raise

PYEOF
          python3 /tmp/test_email.py
